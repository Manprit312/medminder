<ion-header class="auth-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text="Back"></ion-back-button>
    </ion-buttons>
    <ion-title>New password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [scrollY]="false" class="auth-wrap mm-gradient-bg">
  <div class="auth-card mm-auth-card">
    <span class="material-symbols-outlined logo">lock_reset</span>
    <h1>Choose a password</h1>
    <p class="sub">Use at least 8 characters. If you opened this page without a link, paste the token from the email.</p>

    <form (ngSubmit)="submit()">
      <ion-list lines="none" class="form-list">
        <ion-item>
          <span class="material-symbols-outlined input-ic" slot="start">key</span>
          <ion-input
            name="token"
            [(ngModel)]="token"
            label="Reset token"
            labelPlacement="stacked"
            autocomplete="off"
            placeholder="From email link"
          ></ion-input>
        </ion-item>
        <ion-item>
          <span class="material-symbols-outlined input-ic" slot="start">lock</span>
          <ion-input
            type="password"
            name="password"
            [(ngModel)]="password"
            label="New password"
            labelPlacement="stacked"
            autocomplete="new-password"
            required
          ></ion-input>
        </ion-item>
        <ion-item>
          <span class="material-symbols-outlined input-ic" slot="start">lock</span>
          <ion-input
            type="password"
            name="password2"
            [(ngModel)]="password2"
            label="Confirm password"
            labelPlacement="stacked"
            autocomplete="new-password"
            required
          ></ion-input>
        </ion-item>
      </ion-list>
      <ion-button
        expand="block"
        size="large"
        type="submit"
        [disabled]="!token.trim() || !password || !password2"
      >
        Save password
      </ion-button>
    </form>

    <p class="hint">
      <a routerLink="/login">Back to sign in</a>
    </p>
  </div>
</ion-content>
