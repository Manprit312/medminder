<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text="Back"></ion-back-button>
    </ion-buttons>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [scrollY]="false" class="ion-padding auth-wrap mm-gradient-bg">
  <div class="auth-card mm-auth-card">
    <h1>Create account</h1>
    <p class="sub">Use the same email you’ll use on your phone (8+ character password).</p>

    <form (ngSubmit)="submit()">
      <ion-list lines="none" class="form-list">
        <ion-item>
          <span class="material-symbols-outlined input-ic" slot="start">mail</span>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            label="Email"
            labelPlacement="stacked"
            autocomplete="email"
            required
          ></ion-input>
        </ion-item>
        <ion-item>
          <span class="material-symbols-outlined input-ic" slot="start">lock</span>
          <ion-input
            type="password"
            name="password"
            [(ngModel)]="password"
            label="Password"
            labelPlacement="stacked"
            autocomplete="new-password"
            required
          ></ion-input>
        </ion-item>
        <ion-item>
          <span class="material-symbols-outlined input-ic" slot="start">lock_reset</span>
          <ion-input
            type="password"
            name="password2"
            [(ngModel)]="password2"
            label="Confirm password"
            labelPlacement="stacked"
            autocomplete="new-password"
            required
          ></ion-input>
        </ion-item>
      </ion-list>
      <ion-button expand="block" size="large" type="submit" [disabled]="!email.trim() || !password || !password2">
        Create account
      </ion-button>
    </form>

    <p class="hint">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
    <p class="api-hint">API: <code>{{ apiUrl }}</code></p>
  </div>
</ion-content>
