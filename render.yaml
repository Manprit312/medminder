# Blueprint for https://render.com — free web tier (sleeps when idle).
# After connecting the repo, add these in the dashboard (Environment):
#   DATABASE_URL   — PostgreSQL connection string from Neon (see backend/README.md)
#   JWT_SECRET     — long random string (16+ chars)
#   CORS_ORIGINS   — your app origins, comma-separated (e.g. https://your-app.pages.dev)
#   APP_PUBLIC_URL — public URL of the Ionic / web app (password-reset links)
#
# Optional: SMTP_* for email password reset.

services:
  - type: web
    name: medminder-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: TRUST_PROXY
        value: "1"
      - key: HOST
        value: "0.0.0.0"
