<ion-header class="auth-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text="Back"></ion-back-button>
    </ion-buttons>
    <ion-title>Forgot password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [scrollY]="false" class="auth-wrap mm-gradient-bg">
  <div class="auth-card mm-auth-card">
    <span class="material-symbols-outlined logo">mail</span>
    <h1>Reset password</h1>
    <p class="sub">Enter your account email. We will send a link to choose a new password.</p>

    <form (ngSubmit)="submit()">
      <ion-list lines="none" class="form-list">
        <ion-item>
          <span class="material-symbols-outlined input-ic" slot="start">mail</span>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            label="Email"
            labelPlacement="stacked"
            autocomplete="email"
            required
          ></ion-input>
        </ion-item>
      </ion-list>
      <ion-button expand="block" size="large" type="submit" [disabled]="!email.trim()">
        Send reset link
      </ion-button>
    </form>

    <p class="hint">
      Remembered it?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</ion-content>
