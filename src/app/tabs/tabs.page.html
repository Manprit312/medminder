<ion-tabs>
  <ion-router-outlet></ion-router-outlet>
  <ion-tab-bar slot="bottom">
    <ion-tab-button
      tab="today"
      (click)="goTab('/tabs/today')"
      [class.mm-tab-active]="isActive('today')"
    >
      <span class="material-symbols-outlined tab-icon" aria-hidden="true">event_available</span>
      <ion-label>Today</ion-label>
    </ion-tab-button>

    <ion-tab-button
      tab="profiles"
      (click)="goTab('/tabs/profiles')"
      [class.mm-tab-active]="isActive('profiles')"
    >
      <span class="material-symbols-outlined tab-icon" aria-hidden="true">groups</span>
      <ion-label>{{ subscription.isPremium ? 'Family' : 'Profile' }}</ion-label>
    </ion-tab-button>

    <ion-tab-button
      tab="caring"
      (click)="goTab('/tabs/caring')"
      [class.mm-tab-active]="isActive('caring')"
    >
      <span class="material-symbols-outlined tab-icon" aria-hidden="true">volunteer_activism</span>
      <ion-label>Caring</ion-label>
    </ion-tab-button>

    <ion-tab-button
      tab="settings"
      (click)="goTab('/tabs/settings')"
      [class.mm-tab-active]="isActive('settings')"
    >
      <span class="material-symbols-outlined tab-icon" aria-hidden="true">settings</span>
      <ion-label>Settings</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
